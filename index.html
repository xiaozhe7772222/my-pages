<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生成的网页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        p { color: #666; line-height: 1.8; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 30px; background: #667eea; color: white; border-radius: 30px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .btn:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ AI 一键生成的网页</h1>
        <p>这是由 Operit AI 通过 GitHub Pages 托管生成的网页，你可以通过公网链接永久访问！</p>
        <button class="btn" onclick="alert('你好！我是AI生成的页面 🎉')">点我试试</button>
    </div>
</body>
</html>
